<!doctype html>
<html>
    <head>
        <title>chatbot</title>
    </head>
    <body>
        <div class="js-container"></div>
        <script src="react-basics.js"></script>
        <script src="https://unpkg.com/supersimpledev/react.js"></script>
        <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
        <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>
        <script src="https://unpkg.com/supersimpledev/babel.js"></script>
        <script type="text/babel">
            function ChatInput({ chatMessages, setChatMessages }) {
                const [inputText, setInputText] = React.useState("");
                const [isLoading, setLoading] = React.useState(false);

                function saveInputText(event) {
                    setInputText(event.target.value);
                }

                async function sendMessage() {
                    if(isLoading||inputText===''){
                        return;
                    }
                    setLoading(true);

                    // 首先: 情况输入框
                    setInputText("");

                    // 固定唯一的 robotId
                    const robotId = crypto.randomUUID();
                    // 先将 Loadding… 显示出来
                    let response = "Loading…";
                    const newChatMesages = [
                        ...chatMessages,
                        {
                            message: inputText,
                            sender: "user",
                            id: crypto.randomUUID(),
                        },
                    ];
                    // 先将 Loadding… 显示出来
                    setChatMessages([
                        ...newChatMesages,
                        {
                            message: response,
                            sender: "robot",
                            id: robotId,
                        },
                    ]);

                    // 等待后端回复,再次设置聊天框内容
                    response = await Chatbot.getResponseAsync(inputText);
                    setChatMessages([
                        // 复制所有旧的消息,添加新的消息
                        ...newChatMesages,
                        {
                            message: response,
                            sender: "robot",
                            id: robotId,
                        },
                    ]);

                    setLoading(false);
                }

                function enterDown(event) {
                    if (event.key === "Enter") {
                        sendMessage();
                    }
                    if (event.key === "Escape") {
                        setInputText("");
                    }
                }

                return (
                    <>
                        <input
                            placeholder="Send a message to Chatbot"
                            size="30"
                            onChange={saveInputText}
                            value={inputText}
                            onKeyDown={enterDown}
                        />

                        <button
                            // 一旦发生点击行为 → 执行 sendMeaasge函数
                            onClick={sendMessage}>
                            Send
                        </button>
                    </>
                );
            }

            // 传入一条消息 进行渲染
            function ChatMessage({ message, sender }) {
                return (
                    <div>
                        <p>
                            {sender === "robot" && (
                                <img
                                    width="50"
                                    src="robot.png"
                                />
                            )}
                        </p>
                        {message}
                        <p>
                            {sender === "user" && (
                                <img
                                    width="50"
                                    src="user.png"
                                />
                            )}
                        </p>
                    </div>
                );
            }

            // 渲染函数 → 传入的是历史的聊天记录
            function ChatMessages({ chatMessages }) {
                return (
                    <>
                        {chatMessages.map((chatMessage) => {
                            // 将历史记录中的消息逐个渲染
                            return (
                                <ChatMessage
                                    message={chatMessage.message}
                                    sender={chatMessage.sender}
                                    key={chatMessage.id}
                                />
                            );
                        })}
                    </>
                );
            }

            function App() {
                const [chatMessages, setChatMessages] = React.useState([
                    {
                        message: "hello chatbot",
                        sender: "user",
                        id: "id1",
                    },
                    {
                        message: "Hello! How can I help you?",
                        sender: "robot",
                        id: "id2",
                    },
                    {
                        message: "can you get me todays date?",
                        sender: "user",
                        id: "id3",
                    },
                    {
                        message: "Today is March 27",
                        sender: "robot",
                        id: "id4",
                    },
                ]);

                return (
                    <>
                        <ChatInput
                            chatMessages={chatMessages}
                            setChatMessages={setChatMessages}
                        />
                        <ChatMessages chatMessages={chatMessages} />
                    </>
                );
            }

            const container = document.querySelector(".js-container");
            ReactDOM.createRoot(container).render(<App />);
        </script>
    </body>
</html>
