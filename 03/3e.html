<!doctype html>
<html>
    <head>
        <title>3e</title>
        <!-- <link rel="icon" href="" /> -->
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" />
        <link
            rel="stylesheet"
            href="my_habit.css" />
    </head>
    <body>
        <div class="js-container"></div>
        <script src="https://unpkg.com/supersimpledev/react.js"></script>
        <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
        <script src="https://unpkg.com/supersimpledev/babel.js"></script>
        <script type="text/babel">
            // 按钮点击组件
            function ClickButton({currTimes,setTimes}) {

                function buttonClick() {
                    setTimes(currTimes + 1);
                    console.log(currTimes);
                }

                return (
                    <button onClick={buttonClick}>
                        clicked {currTimes} {currTimes === 1 ? "time" : "times"}
                    </button>
                );
            }

            function App() {
                const [currTimes, setTimes] = React.useState(0);
                return (
                    <>
                        <ClickButton currTimes={currTimes} setTimes={setTimes}/>
                        <ClickButton currTimes={currTimes} setTimes={setTimes} />
                    </>
                );
            }
            const container = document.querySelector(".js-container");
            ReactDOM.createRoot(container).render(<App />);
        </script>
    </body>
</html>
